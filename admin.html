<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ | Электронное портфолио</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="login-screen" class="admin-login">
    <form class="admin-login__card" id="login-form">
      <h1>Админ-панель</h1>
      <p>Электронное портфолио — Колледж ДГУ</p>
      <label>Логин<input type="text" id="login-user" autocomplete="username" required /></label>
      <label>Пароль<input type="password" id="login-pass" autocomplete="current-password" required /></label>
      <button type="submit" class="btn-search">Войти</button>
      <p class="admin-login__error" id="login-error"></p>
      <a href="/" class="admin-back">← На сайт</a>
    </form>
  </div>

  <div id="admin-app" class="admin-app" hidden>
    <header class="admin-header">
      <div>
        <strong>Админ-панель</strong>
        <span id="admin-user"></span>
      </div>
      <div class="admin-header__actions">
        <a href="/" class="btn-reset">На сайт</a>
        <button class="btn-reset" id="btn-logout">Выйти</button>
      </div>
    </header>

    <div class="admin-layout">
      <aside class="admin-sidebar">
        <input type="text" id="student-filter" class="search-input" placeholder="Поиск студента..." />
        <div id="student-list" class="admin-student-list"></div>
      </aside>

      <main class="admin-main" id="admin-main">
        <p class="admin-placeholder">Выберите студента слева</p>
      </main>
    </div>
  </div>

  <div id="toast" class="admin-toast"></div>
  <script src="./admin.js"></script>
</body>
</html>

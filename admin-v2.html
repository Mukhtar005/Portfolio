<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель | Электронное портфолио</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Логин -->
  <div id="login-screen" class="admin-login">
    <form id="login-form" class="admin-login__card">
      <h1>🔐 Админ-панель</h1>
      <p>Электронное портфолио — Колледж ДГУ</p>
      <label>
        Логин
        <input type="text" id="login-user" placeholder="Arthur" autocomplete="username" required>
      </label>
      <label>
        Пароль
        <input type="password" id="login-pass" placeholder="1234" autocomplete="current-password" required>
      </label>
      <button type="submit" class="btn-search">Войти</button>
      <p id="login-error" class="admin-login__error" style="color: #dc2626; min-height: 20px;"></p>
      <a href="/" class="admin-back" style="color: var(--text-muted); text-decoration: none;">← Вернуться на сайт</a>
    </form>
  </div>

  <!-- Основная админ-панель -->
  <div id="admin-app" class="admin-app" hidden>
    <!-- Шапка -->
    <header class="top-nav" style="position: sticky; top:0; z-index: 100;">
      <div class="top-nav__brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color: var(--accent);">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <div class="brand__title">Админ-панель</div>
      </div>
      <nav class="top-nav__nav">
        <a href="/" class="nav-link" style="color: white;">На сайт</a>
        <button id="btn-logout" class="btn-reset" style="background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 16px;">Выйти</button>
      </nav>
    </header>

    <!-- Основной контент -->
    <div class="app-container" style="max-width: 1400px;">
      <!-- Панель действий -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="font-size: 24px; font-weight: 800; color: var(--text-main);">Управление студентами</h2>
        <button id="btn-add-student" class="btn-search">
          <span>+ Добавить студента</span>
        </button>
      </div>

      <!-- Форма добавления -->
      <div id="add-student-form" class="search-form" style="display: none; margin-bottom: 24px;">
        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px;">Новый студент</h3>
        <div class="admin-form-grid">
          <div class="admin-field full">
            <label>ФИО</label>
            <input id="new-name" placeholder="Иванов Иван Иванович" type="text">
          </div>
          <div class="admin-field">
            <label>Группа</label>
            <input id="new-group" placeholder="1" type="text">
          </div>
          <div class="admin-field">
            <label>Телефон</label>
            <input id="new-phone" placeholder="+7 (XXX) XXX-XX-XX" type="text">
          </div>
          <div class="admin-field">
            <label>Пол</label>
            <select id="new-gender">
              <option value="m">Мужской</option>
              <option value="f">Женский</option>
            </select>
          </div>
          <div class="admin-field">
            <label>Тип</label>
            <select id="new-type">
              <option value="top">Отличник</option>
              <option value="good_plus">Хорошист</option>
              <option value="weak">Слабый</option>
            </select>
          </div>
          <div class="admin-field">
            <label>Форма обучения</label>
            <select id="new-form">
              <option value="Очная">Очная</option>
              <option value="Заочная">Заочная</option>
            </select>
          </div>
          <div class="admin-field">
            <label>Основа</label>
            <select id="new-base">
              <option value="Бюджетная">Бюджетная</option>
              <option value="Платная">Платная</option>
            </select>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 16px;">
          <button id="btn-save-new" class="btn-search">Сохранить</button>
          <button id="btn-cancel-new" class="btn-reset">Отмена</button>
        </div>
      </div>

      <!-- Таблица студентов -->
      <div class="student-list-container">
        <div class="list-header">
          <div>№</div>
          <div>ФИО</div>
          <div>Группа</div>
          <div>Тип</div>
          <div>Форма</div>
          <div>Действия</div>
        </div>
        <div id="students-table"></div>
      </div>

      <!-- Модалка редактирования -->
      <div id="edit-modal" class="fullscreen-view" style="display: none;">
        <div class="modal-content" style="max-width: 900px;">
          <div class="modal-header">
            <h2>Редактировать студента</h2>
            <button id="close-edit-modal" class="btn-close">Закрыть</button>
          </div>
          <div class="modal-body">
            <div id="edit-tabs" class="admin-tabs" style="border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px;">
              <button class="admin-tab active" data-tab="profile">Профиль</button>
              <button class="admin-tab" data-tab="grades">Оценки</button>
              <button class="admin-tab" data-tab="portfolio">Портфолио</button>
            </div>
            <div id="edit-tab-content"></div>
            <div class="admin-actions" style="margin-top: 24px;">
              <button id="btn-save-edit" class="btn-search">Сохранить изменения</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Тост -->
      <div id="toast" class="admin-toast"></div>
    </div>
  </div>

  <script src="./admin-v2.js"></script>
</body>
</html>
